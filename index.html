<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aryan Kahar — ~/portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --void:#0a0e14;
      --panel:#11151c;
      --panel-edge:#1c2129;
      --text:#d7dce2;
      --muted:#5c6773;
      --amber:#ffb454;
      --green:#7fd88f;
      --red:#ff6b6b;
      --blue:#7ab8ff;
    }
    *{box-sizing:border-box;}
    @media (prefers-reduced-motion: reduce){
      *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
    }
    html,body{
      height:100%;
      margin:0;
      background: radial-gradient(ellipse at 20% 0%, #131824 0%, var(--void) 55%), var(--void);
      font-family:'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
      color:var(--text);
    }
    .stage{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }
    .window{
      width:100%;
      max-width:900px;
      background:var(--panel);
      border:1px solid var(--panel-edge);
      border-radius:10px;
      box-shadow:0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.02);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .titlebar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 14px;
      background:linear-gradient(180deg,#161b23,#12151b);
      border-bottom:1px solid var(--panel-edge);
    }
    .dot{width:11px;height:11px;border-radius:50%;}
    .dot.r{background:#ff5f57;}
    .dot.y{background:#febc2e;}
    .dot.g{background:#28c840;}
    .titlebar-label{
      flex:1;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.03em;
    }
    .term{
      padding:22px 24px 16px;
      height:min(560px, 62vh);
      overflow-y:auto;
      font-size:14px;
      line-height:1.65;
    }
    .term::-webkit-scrollbar{width:9px;}
    .term::-webkit-scrollbar-thumb{background:var(--panel-edge); border-radius:6px;}
    .line{white-space:pre-wrap; word-break:break-word;}
    .prompt-line{display:flex; gap:8px;}
    .prompt-sym{color:var(--amber); flex-shrink:0;}
    .cmd-echo{color:var(--text);}
    .muted{color:var(--muted);}
    .amber{color:var(--amber);}
    .green{color:var(--green);}
    .red{color:var(--red);}
    .blue{color:var(--blue);}
    .bold{font-weight:700;}
    a{color:var(--blue); text-decoration:none; border-bottom:1px solid rgba(122,184,255,0.35);}
    a:hover{border-bottom-color:var(--blue);}
    .banner{color:var(--amber); font-weight:800; line-height:1.25;}
    .barwrap{display:inline-block; min-width:170px;}
    .bar{
      display:inline-block;
      height:8px;
      background:var(--panel-edge);
      border-radius:4px;
      overflow:hidden;
      width:160px;
      vertical-align:middle;
      margin-right:8px;
    }
    .bar > i{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--amber),var(--green));
      animation:fill 900ms ease forwards;
    }
    @keyframes fill{to{width:100%;}}
    .inputrow{
      display:flex;
      align-items:center;
      gap:8px;
      padding:0 24px 20px;
    }
    .inputrow .prompt-sym{color:var(--amber);}
    .inputrow input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      font:inherit;
      font-size:14px;
      caret-color:var(--amber);
    }
    .cursor{
      display:inline-block;
      width:8px;
      height:16px;
      background:var(--amber);
      margin-left:2px;
      animation:blink 1s step-end infinite;
      vertical-align:-3px;
    }
    @keyframes blink{50%{opacity:0;}}
    .hint{
      font-size:11.5px;
      color:var(--muted);
      padding:0 24px 16px;
      letter-spacing:.02em;
    }
    .hint kbd{
      background:var(--panel-edge);
      border:1px solid #262c36;
      border-radius:4px;
      padding:1px 5px;
      font-size:11px;
      color:var(--text);
    }
    table{border-collapse:collapse; margin:2px 0 6px;}
    td{padding:1px 14px 1px 0; vertical-align:top;}
    @media (max-width:600px){
      .stage{padding:0;}
      .window{max-width:100%; height:100vh; border-radius:0;}
      .term{height:auto; flex:1;}
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="window">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="titlebar-label">aryan@portfolio — bash — 90×30</span>
      </div>
      <div class="term" id="term" tabindex="-1"></div>
      <div class="inputrow">
        <span class="prompt-sym">➜</span>
        <input id="cmdInput" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Terminal command input" />
        <span class="cursor" id="fakeCursor"></span>
      </div>
      <div class="hint">type <kbd>help</kbd> to see what's available · <kbd>↑</kbd>/<kbd>↓</kbd> for history</div>
    </div>
  </div>

  <script>
    const term = document.getElementById('term');
    const input = document.getElementById('cmdInput');
    const fakeCursor = document.getElementById('fakeCursor');

    const PROJECTS = {
      runx: {
        title: "Runx",
        tag: "Universal Project Launcher",
        stack: "Rust • CLI • Cross‑Platform",
        desc: "A universal project launcher written in Rust that automatically downloads, manages, caches, and runs portable programming language runtimes without requiring global installations. Built for reproducible development environments across Linux, macOS, and Windows.",
        url: "https://github.com/aryankahar31/runx"
      },
      onex: {
        title: "OneX",
        tag: "Life Visualization Android App",
        stack: "Kotlin • Jetpack Compose • Android",
        desc: "A native Android application that turns your life into a grid of dots. Each dot represents a unit of time — helping you visualize life, progress, and habits. Features live wallpapers, widgets, life statistics, habit tracking, and customizable themes.",
        url: "https://github.com/aryankahar31/onex"
      },
      alienxfilev2: {
        title: "AlienXFileV2",
        tag: "Secure File Sharing Platform",
        stack: "Python • Flask • Firebase",
        desc: "A secure file and text sharing platform featuring temporary links, encrypted transfers, media downloading, and cloud storage integration for fast and private sharing.",
        url: "https://github.com/aryankahar31/AlienXFileV2"
      }
    };

    function esc(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function print(html){
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = html;
      term.appendChild(div);
      term.scrollTop = term.scrollHeight;
    }

    function printPrompt(cmdText){
      print(`<div class="prompt-line"><span class="prompt-sym">➜</span><span class="cmd-echo">${esc(cmdText)}</span></div>`);
    }

    function banner(){
      print(`<pre class="banner">
 █████╗ ██████╗ ██╗ ██╗ █████╗ ███╗ ██╗
██╔══██╗██╔══██╗╚██╗ ██╔╝██╔══██╗████╗ ██║
███████║██████╔╝ ╚████╔╝ ███████║██╔██╗ ██║
██╔══██║██╔══██╗ ╚██╔╝  ██╔══██║██║╚██╗██║
██║  ██║██║  ██║  ██║   ██║  ██║██║ ╚████║
╚═╝  ╚═╝╚═╝  ╚═╝  ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═══╝</pre>`);
      print(`<span class="muted">Computer Science student · software developer · Mumbai, India</span>`);
      print(`<span class="muted">Session started. Type </span><span class="amber">help</span><span class="muted"> to see available commands.</span>`);
      print('');
    }

    const COMMANDS = {
      help(){
        print(`<table>
          <tr><td class="amber">about</td><td class="muted">who I am</td></tr>
          <tr><td class="amber">projects</td><td class="muted">list what I'm building</td></tr>
          <tr><td class="amber">runx</td><td class="muted">launch the project menu (try it)</td></tr>
          <tr><td class="amber">cat &lt;project&gt;</td><td class="muted">e.g. <span class="green">cat runx</span> — project details</td></tr>
          <tr><td class="amber">skills</td><td class="muted">tech stack</td></tr>
          <tr><td class="amber">contact</td><td class="muted">email &amp; socials</td></tr>
          <tr><td class="amber">clear</td><td class="muted">clear the screen</td></tr>
        </table>`);
      },
      about(){
        print(`Computer Science student and software developer from India.`);
        print(`I build developer tools, AI-powered applications, and modern backend systems with a focus on performance, portability, and developer experience.`);
        print(`Currently working on <span class="amber">Runx</span>, <span class="amber">OneX</span>, and <span class="amber">AlienXFileV2</span> while exploring Rust, systems programming, and AI infrastructure.`);
        print('');
      },
      whoami(){ COMMANDS.about(); },
      projects(){
        print(`<span class="muted">Featured Projects</span>`);
        Object.values(PROJECTS).forEach(p=>{
          print(`  <span class="green">●</span> <span class="bold">${p.title}</span>`);
          print(`     <span class="muted">${p.tag}</span>`);
          print(`     <span class="blue">${p.stack}</span>`);
        });
        print(`<span class="muted">→ type </span><span class="amber">cat &lt;name&gt;</span><span class="muted"> for details, or run </span><span class="amber">runx</span>`);
        print('');
      },
      ls(){ COMMANDS.projects(); },
      skills(){
        print(`<span class="amber bold">Languages</span> Rust · Python · TypeScript · JavaScript · C++ · Kotlin`);
        print(`<span class="amber bold">Frontend</span> React · Next.js · Vite · Tailwind CSS · Jetpack Compose (Android)`);
        print(`<span class="amber bold">Backend</span> Node.js · Express · FastAPI · Flask`);
        print(`<span class="amber bold">Data</span> PostgreSQL · Prisma · Firebase`);
        print(`<span class="amber bold">AI</span> Gemini API · OpenAI API · LangChain`);
        print(`<span class="amber bold">Tools</span> Docker · Git · GitHub Actions · Linux · Android Studio`);
        print('');
      },
      stack(){ COMMANDS.skills(); },
      contact(){
        print(`<span class="green">portfolio</span> <a href="https://aryankahar31.xyz" target="_blank">aryankahar31.xyz</a>`);
        print(`<span class="green">email</span>   <a href="mailto:aryankahar.business@gmail.com">aryankahar.business@gmail.com</a>`);
        print(`<span class="green">github</span>   <a href="https://github.com/aryankahar31" target="_blank">github.com/aryankahar31</a>`);
        print(`<span class="green">linkedin</span> <a href="https://www.linkedin.com/in/aryan-kahar-4b5370246/" target="_blank">linkedin.com/in/aryan-kahar</a>`);
        print(`<span class="green">x</span>        <a href="https://x.com/aryankahar31" target="_blank">x.com/aryankahar31</a>`);
        print('');
      },
      socials(){ COMMANDS.contact(); },
      clear(){
        term.innerHTML = '';
      },
      sudo(args){
        if(args.join(' ') === 'make me a sandwich'){
          print(`<span class="red">Permission denied.</span> <span class="muted">Nice try though.</span>`);
        } else {
          print(`<span class="red">[sudo] password for aryan: </span><span class="muted">nah, you don't get root here.</span>`);
        }
      },
      async runx(args){
        if(args.length === 0){
          print(`<span class="muted">runx v1.0 — detecting portable runtimes...</span>`);
          const steps = ['scanning workspace', 'resolving runtime targets', 'mounting portable envs'];
          for(const s of steps){
            const id = 'b'+Math.random().toString(36).slice(2,8);
            print(`<span class="barwrap"><span class="bar"><i></i></span><span class="muted">${s}</span></span>`);
            await sleep(420);
          }
          print(`<span class="green">✓ runtimes ready.</span> <span class="muted">Available launch targets:</span>`);
          Object.keys(PROJECTS).forEach(k=>{
            print(`  <span class="blue">▸</span> ${PROJECTS[k].title} <span class="muted">— run 'runx run ${k}'</span>`);
          });
          print('');
          return;
        }
        if(args[0] === 'run' && args[1]){
          const key = args[1].toLowerCase();
          const p = PROJECTS[key];
          if(!p){
            print(`<span class="red">runx: no target named "${esc(args[1])}"</span> <span class="muted">— try 'runx' with no args to list targets</span>`);
            return;
          }
          print(`<span class="muted">launching</span> <span class="amber bold">${p.title}</span><span class="muted">...</span>`);
          await sleep(300);
          print(`<span class="barwrap"><span class="bar"><i></i></span><span class="muted">booting environment</span></span>`);
          await sleep(500);
          print(`<span class="green">✓</span> ${p.title} is live. <a href="${p.url}" target="_blank">open on GitHub →</a>`);
          print('');
          return;
        }
        print(`<span class="muted">usage: runx [run &lt;project&gt;]</span>`);
      },
      cat(args){
        if(!args.length){ print(`<span class="red">cat: missing operand</span>`); return; }
        const key = args[0].replace(/.md$/,'').toLowerCase();
        const p = PROJECTS[key];
        if(!p){
          print(`<span class="red">cat: ${esc(args[0])}: no such project</span> <span class="muted">— see 'projects'</span>`);
          return;
        }
        print(`<span class="amber bold">## ${p.title}</span>`);
        print(`<span class="muted">${p.tag} · ${p.stack}</span>`);
        print(p.desc);
        print(`<a href="${p.url}" target="_blank">${p.url}</a>`);
        print('');
      }
    };

    function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

    const history = [];
    let historyIdx = -1;

    async function runCommand(raw){
      printPrompt(raw);
      const trimmed = raw.trim();
      if(!trimmed){ return; }
      history.push(trimmed);
      historyIdx = history.length;
      const parts = trimmed.split(/\s+/);
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);
      if(COMMANDS[cmd]){
        await COMMANDS[cmd](args);
      } else {
        print(`<span class="red">command not found:</span> ${esc(cmd)} <span class="muted">— type 'help'</span>`);
      }
    }

    input.addEventListener('keydown', async (e)=>{
      if(e.key === 'Enter'){
        const val = input.value;
        input.value = '';
        await runCommand(val);
      } else if(e.key === 'ArrowUp'){
        e.preventDefault();
        if(historyIdx > 0){ historyIdx--; input.value = history[historyIdx] || ''; }
      } else if(e.key === 'ArrowDown'){
        e.preventDefault();
        if(historyIdx < history.length - 1){ historyIdx++; input.value = history[historyIdx] || ''; }
        else { historyIdx = history.length; input.value = ''; }
      }
    });

    document.querySelector('.window').addEventListener('click', ()=> input.focus());

    banner();
    input.focus();
  </script>
</body>
</html>
